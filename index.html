<!DOCTYPE html>
<html lang="es">
<head>
  <title>Glambrat | Accesorios de Belleza en Colombia</title>
  <meta name="description" content="Glambrat co - La mejor tienda de accesorios de belleza.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--pink:#e8389a;--pink-light:#f472c0;--purple:#7c3fc4;--purple-deep:#4e1a8a;--blue:#3e8fe8;--blue-bright:#5bb8ff;--yellow:#ffd84d;--white:#fff;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#f9a8e8 0%,#d46ff0 35%,#7c3fc4 70%,#4e1a8a 100%);min-height:100vh;color:#fff;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 25%,rgba(255,255,255,.12) 1px,transparent 1px),radial-gradient(circle at 75% 15%,rgba(255,255,255,.10) 1.5px,transparent 1.5px),radial-gradient(circle at 45% 70%,rgba(255,255,255,.08) 1px,transparent 1px),radial-gradient(circle at 85% 55%,rgba(255,255,255,.12) 2px,transparent 2px);background-size:300px 300px,200px 200px,400px 400px,250px 250px;pointer-events:none;z-index:0;}
 
    /* ── HEADER ── */
    header{position:sticky;top:0;z-index:100;background:rgba(78,26,138,.9);backdrop-filter:blur(16px);border-bottom:2px solid rgba(255,255,255,.18);}
    .header-top{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:12px;}
    .logo{font-family:'Fredoka One',cursive;line-height:1;display:flex;flex-direction:column;align-items:flex-start;text-shadow:2px 2px 0 rgba(0,0,0,.2);flex-shrink:0;}
    .logo .glam{color:var(--pink-light);font-size:1rem;letter-spacing:2px;}
    .logo .brat{color:var(--blue-bright);font-size:1.4rem;}
    .logo .co{color:var(--yellow);font-size:.8rem;letter-spacing:3px;}
 
    .header-search{flex:1;max-width:380px;position:relative;}
    .search-input{width:100%;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);border-radius:50px;padding:9px 18px 9px 40px;color:#fff;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;outline:none;transition:border-color .2s,background .2s;}
    .search-input::placeholder{color:rgba(255,255,255,.5);}
    .search-input:focus{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.2);}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;opacity:.7;}
 
    .header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .icon-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.28);color:#fff;width:40px;height:40px;border-radius:12px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;position:relative;}
    .icon-btn:hover{background:rgba(255,255,255,.28);}
    .cart-badge{position:absolute;top:-6px;right:-6px;background:var(--pink);color:#fff;font-size:.62rem;font-weight:900;min-width:19px;height:19px;border-radius:50px;display:flex;align-items:center;justify-content:center;border:2px solid #4e1a8a;font-family:'Fredoka One',cursive;}
 
    .header-nav{display:flex;gap:6px;padding:0 24px 12px;overflow-x:auto;scrollbar-width:none;}
    .header-nav::-webkit-scrollbar{display:none;}
    .cat-pill{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);color:rgba(255,255,255,.82);padding:5px 16px;border-radius:50px;font-weight:800;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .18s;font-family:'Nunito',sans-serif;letter-spacing:.3px;}
    .cat-pill:hover{background:rgba(255,255,255,.22);color:#fff;}
    .cat-pill.active{background:var(--pink);border-color:var(--pink-light);color:#fff;box-shadow:0 3px 14px rgba(232,56,154,.45);}
 
    /* ── HERO ── */
    .hero{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px 32px;display:flex;align-items:center;gap:36px;}
    .hero-left{flex:1;display:flex;flex-direction:column;gap:14px;}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);backdrop-filter:blur(8px);color:var(--yellow);font-weight:800;font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;border-radius:50px;width:fit-content;}
    .hero-logo-big{font-family:'Fredoka One',cursive;line-height:1;filter:drop-shadow(0 4px 18px rgba(0,0,0,.22));}
    .hero-logo-big .h-glam{display:block;font-size:clamp(3rem,9vw,5.5rem);color:var(--pink-light);-webkit-text-stroke:2.5px rgba(255,255,255,.38);text-shadow:4px 4px 0 var(--pink),7px 7px 0 rgba(0,0,0,.12);}
    .hero-logo-big .h-brat{display:block;font-size:clamp(2.5rem,8vw,4.5rem);color:var(--blue-bright);-webkit-text-stroke:2.5px rgba(255,255,255,.32);text-shadow:4px 4px 0 var(--blue),7px 7px 0 rgba(0,0,0,.12);}
    .sparkles-row{display:flex;gap:10px;align-items:center;font-size:1.4rem;animation:sparkle 2s ease-in-out infinite;}
    @keyframes sparkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.92)}}
    .hero-sub{font-size:1rem;font-weight:600;color:rgba(255,255,255,.88);max-width:380px;line-height:1.65;}
 
    /* ── PRODUCT GRID ── */
    .grid-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 56px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
    .card{background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.26);border-radius:22px;overflow:hidden;backdrop-filter:blur(12px);display:flex;flex-direction:column;transition:transform .22s,box-shadow .22s;box-shadow:0 8px 30px rgba(0,0,0,.16);cursor:pointer;}
    .card:hover{transform:translateY(-8px);border-color:rgba(255,255,255,.48);}
 
    .card-img-wrap{position:relative;background:#1a0835;height:210px;overflow:hidden;}
    .card-img{width:100%;height:100%;object-fit:contain;transition:transform .3s;}
    .card-badge{position:absolute;top:10px;left:10px;font-size:.65rem;font-weight:900;padding:4px 10px;border-radius:50px;font-family:'Fredoka One',cursive;}
    .badge-new{background:var(--pink);color:#fff;}
 
    .card-body{padding:15px 15px 18px;display:flex;flex-direction:column;gap:4px;flex:1;}
    .card-tag{font-size:.68rem;font-weight:800;color:var(--yellow);}
    .card h3{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;}
    .card-desc{font-size:.8rem;color:rgba(255,255,255,.7);line-height:1.5;}
    .price{font-family:'Fredoka One',cursive;font-size:1.08rem;color:var(--yellow);}
 
    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(20,5,45,.78);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.active{display:flex;}
    .modal{background:linear-gradient(145deg,#3d1270,#5a1a9a);border:2px solid rgba(255,255,255,.28);border-radius:26px;max-width:480px;width:100%;position:relative;}
 
    /* Estilos de botones de WhatsApp */
    .wa-checkout, .modal-wa-btn {
      background: #25d366;
      color: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      display: block;
      margin-top: 10px;
      font-family: 'Fredoka One';
    }
  </style>
</head>
<body>
 
<header>
  <div class="header-top">
    <div class="logo">
      <span class="glam">&#10022; GLAM</span>
      <span class="brat">Brat</span>
      <span class="co">Co. &#128156;</span>
    </div>
    <div class="header-search">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar productos...">
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="cartIconBtn">&#128722;<span class="cart-badge" id="cartBadge">0</span></button>
      <button class="icon-btn" id="menuBtn">&#9776;</button>
    </div>
  </div>
  <div class="header-nav">
    <button class="cat-pill active" data-cat="todos">Todo</button>
    <button class="cat-pill" data-cat="lentes">Lentes</button>
    <button class="cat-pill" data-cat="accesorios">Accesorios</button>
  </div>
</header>
 
<div id="secLentes">
  <div class="section-head"><h2 class="section-title" style="padding:20px">👁️ Lentes de Contacto</h2></div>
  <div class="grid-wrap"><div class="grid" id="gridLentes"></div></div>
</div>
 
<div id="secAccesorios">
  <div class="section-head"><h2 class="section-title" style="padding:20px">✨ Accesorios</h2></div>
  <div class="grid-wrap"><div class="grid" id="gridAccesorios"></div></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button id="modalClose" style="position:absolute; top:10px; right:10px;">X</button>
    <img id="modalImg" style="width:100%; height:250px; object-fit:contain;" src="" alt="">
    <div style="padding:20px;">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div id="modalPrice" style="font-size:1.5rem; color:var(--yellow); margin:10px 0;"></div>
      <a class="modal-wa-btn" id="modalWaBtn" href="#">Pedir por WhatsApp</a>
    </div>
  </div>
</div>
 
<script>
  const PRODUCTOS = [
    { id:2, nombre:"Hybrid Kitten Green", categoria:"lentes", precio:35000, descripcion:"Efecto natural y vibrante. Diámetro 14.2mm, uso anual.", especificaciones:["Anual"], img:"lente-hybrid-kitten-green.jpeg", nuevo:false },
    { id:3, nombre:"Millennial Spice", categoria:"lentes", precio:35000, descripcion:"Gris con efecto moderno y elegante. Uso anual.", especificaciones:["Anual"], img:"lente-millennial-spice.jpeg", nuevo:false },
    { id:19, nombre:"Blackspot Blue", categoria:"lentes", precio:35000, descripcion:"Azul profundo con efecto elegante. Uso anual.", especificaciones:["Anual"], img:"blackspot-blue.jpg", nuevo:true },
    { id:25, nombre:"Solución Hydra-Beauty", categoria:"accesorios", precio:16000, descripcion:"¡Tu mirada merece frescura total! Hidrata profundamente y limpia tus lentes para un confort insuperable durante todo el día. Imprescindible para ojos sensibles.", especificaciones:["Contenido: 120 ML", "Multipropósito"], img:"Hydra-Beauty.jpg", nuevo:true }
  ];
 
  function renderProducts() {
    const gridLentes = document.getElementById('gridLentes');
    const gridAccesorios = document.getElementById('gridAccesorios');
    
    gridLentes.innerHTML = "";
    gridAccesorios.innerHTML = "";

    PRODUCTOS.forEach(p => {
      const card = `
        <div class="card" onclick="openModal(${p.id})">
          <div class="card-img-wrap">
            <img class="card-img" src="${p.img}" alt="${p.nombre}">
            ${p.nuevo ? '<span class="card-badge badge-new">Nuevo</span>' : ''}
          </div>
          <div class="card-body">
            <h3>${p.nombre}</h3>
            <p class="card-desc">${p.descripcion.substring(0,50)}...</p>
            <div class="price">$${p.precio.toLocaleString()} COP</div>
          </div>
        </div>`;
      
      if(p.categoria === 'lentes') gridLentes.innerHTML += card;
      else gridAccesorios.innerHTML += card;
    });
  }

  function openModal(id) {
    const p = PRODUCTOS.find(x => x.id === id);
    document.getElementById('modalImg').src = p.img;
    document.getElementById('modalTitle').innerText = p.nombre;
    document.getElementById('modalDesc').innerText = p.descripcion;
    document.getElementById('modalPrice').innerText = `$${p.precio.toLocaleString()} COP`;
    document.getElementById('modalOverlay').classList.add('active');
  }

  document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('active');

  window.onload = renderProducts;
</script>
</body>
</html>
