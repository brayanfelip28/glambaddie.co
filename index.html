<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlamBrat Co. 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e8389a;
    --pink-light: #f472c0;
    --purple: #7c3fc4;
    --purple-deep: #4e1a8a;
    --blue: #3e8fe8;
    --blue-bright: #5bb8ff;
    --yellow: #ffd84d;
    --white: #fff;
    --bg-grad: linear-gradient(160deg, #f9a8e8 0%, #d46ff0 35%, #7c3fc4 70%, #4e1a8a 100%);
    --card-bg: rgba(255,255,255,0.15);
    --card-border: rgba(255,255,255,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-grad);
    background-attachment: fixed;
    color: var(--white);
    min-height: 100vh;
    padding-bottom: 50px;
  }
  header {
    padding: 60px 20px;
    text-align: center;
    background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%);
  }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem;
    text-transform: uppercase;
    letter-spacing: -2px;
    text-shadow: 4px 4px 0px var(--purple-deep), 8px 8px 20px rgba(0,0,0,0.3);
    margin-bottom: 10px;
    display: block;
  }
  .container { width: 95%; max-width: 1200px; margin: 0 auto; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    margin-top: 30px;
  }
  .card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    overflow: hidden;
    transition: 0.3s;
    position: relative;
    animation: fadeIn 0.8s ease-out forwards;
    opacity: 0;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
  .card-img { width: 100%; height: 200px; object-fit: cover; }
  .card-body { padding: 20px; }
  .card-tag {
    background: var(--yellow);
    color: var(--purple-deep);
    font-weight: 900;
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  h3 { font-family: 'Fredoka One', cursive; font-size: 1.4rem; margin-bottom: 8px; }
  .price { font-size: 1.5rem; font-weight: 900; color: var(--yellow); }
  .wa-btn {
    display: block;
    background: #25D366;
    color: white;
    text-align: center;
    padding: 12px;
    border-radius: 15px;
    text-decoration: none;
    font-weight: 800;
    margin-top: 15px;
    transition: 0.3s;
  }
  .wa-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
</style>
</head>
<body>

<header>
  <span class="logo">GlamBrat Co.</span>
  <p style="font-weight:700; opacity:0.9;">¡Realza tu mirada con el mejor estilo!</p>
</header>

<div class="container">
  <div class="grid" id="productGrid"></div>
</div>

  ];

    card.innerHTML = `
