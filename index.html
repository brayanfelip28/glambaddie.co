<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glambrat | Lentes de Contacto y Belleza en Colombia</title>
    <meta name="description" content="Glambrat co - La mejor tienda de lentes de contacto y accesorios de belleza. Encuentra tu estilo con Glambrat.">
    <meta property="og:title" content="Glambrat co">
    <meta property="og:url" content="https://brayanfelip28.github.io/glambrat/">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #e8389a; --pink-light: #f472c0; --purple: #7c3fc4; 
            --purple-deep: #4e1a8a; --blue: #3e8fe8; --blue-bright: #5bb8ff; 
            --yellow: #ffd84d; --white: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background: linear-gradient(135deg, var(--purple-deep), #2a0a4d); color: var(--white); min-height: 100vh; }
        
        header { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: rgba(78, 26, 138, .82); backdrop-filter: blur(16px); border-bottom: 2px solid rgba(255, 255, 255, .2); }
        .logo { font-family: 'Fredoka One', cursive; display: flex; flex-direction: column; text-shadow: 3px 3px 0 rgba(0,0,0,.2); }
        .logo .glam { color: var(--pink-light); font-size: 1.1rem; letter-spacing: 2px; }
        .logo .brat { color: var(--blue-bright); font-size: 1.5rem; }

        .hero { padding: 40px 24px; text-align: center; background: radial-gradient(circle at center, rgba(232, 56, 154, 0.15) 0%, transparent 70%); }
        .hero-logo-big { font-family: 'Fredoka One', cursive; line-height: 1; margin-bottom: 20px; }
        .hero-logo-big .h-glam { display: block; font-size: clamp(3.5rem, 10vw, 6rem); color: var(--pink-light); -webkit-text-stroke: 3px rgba(255,255,255,.4); text-shadow: 4px 4px 0 var(--pink); }
        .hero-logo-big .h-brat { display: block; font-size: clamp(3rem, 9vw, 5.2rem); color: var(--blue-bright); -webkit-text-stroke: 3px rgba(255,255,255,.35); text-shadow: 4px 4px 0 var(--blue); }

        .grid-wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.08); }
        .card-img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 16px; }
        .price { font-size: 1.4rem; font-weight: 800; color: var(--yellow); margin: 10px 0; }
        .wa-btn { display: block; background: #25d366; color: white; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; }

        /* Modal y Sidebar (Simplificado para el ejemplo) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--purple-deep); padding: 20px; border-radius: 20px; max-width: 500px; width: 90%; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 10px; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        
        footer { padding: 24px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span class="glam">✧ GLAM</span>
        <span class="brat">Brat Co. 💜</span>
    </div>
    <button id="menuBtn" style="background:none; border:none; color:white; font-size:1.5rem;">☰</button>
</header>

<section class="hero">
    <div class="hero-logo-big">
        <span class="h-glam">Glam</span>
        <span class="h-brat">Brat</span>
    </div>
    <p>Lentes de contacto y accesorios beauty ✨ Envíos a toda Colombia 🇨🇴</p>
</section>

<div class="section-head" style="max-width: 1100px; margin: 0 auto; padding: 20px 24px;">
    <h2 id="sectionTitle">Lentes de Contacto ✧</h2>
    <span id="sectionCount"></span>
</div>

<div class="grid-wrap">
    <div class="grid" id="productGrid">
        <!-- Los productos se cargan aquí -->
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" id="modalClose">✕</button>
        <img id="modalImg" src="" style="width:100%; border-radius:15px; margin-bottom:15px;">
        <div id="modalTitle" style="font-size:1.5rem; font-weight:800; margin-bottom:10px;"></div>
        <p id="modalDesc" style="margin-bottom:15px; opacity:0.9;"></p>
        <div id="modalSpecs" style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;"></div>
        <div id="modalPrice" class="price"></div>
        <a id="modalWaBtn" class="wa-btn" href="" target="_blank">💬 Pedir por WhatsApp</a>
    </div>
</div>

<footer>Hecho con amor por <strong>GlamBrat Co.</strong> · Bogotá, Colombia · 2025 ✧</footer>

<script>
    // Referencias de imágenes en Base64 (Añade tus códigos aquí)
    const IMGS = {
        honey: "data:image/jpeg;base64,...", // [3]
        sugar_pop_brown: "data:image/jpeg;base64,...", // [3]
        estonia_green: "COLOQUE_AQUI_EL_BASE64_DE_LA_FOTO_ESTONIA", // [1]
        nicosia_blue: "COLOQUE_AQUI_EL_BASE64_DE_LA_FOTO_NICOSIA"   // [2]
        // ... otras imágenes
    };

    const labels = {lentes:'Lentes de Contacto', pestanas:'Pestañas Postizas', accesorios:'Accesorios'};

    const data = {
        lentes: [
            {
                name: "Estonia Green",
                desc: "Tono verde natural y vibrante. Ideal para una mirada fresca y auténtica.",
                price: "$35.000 COP",
                img: IMGS.estonia_green,
                specs: ["14.5mm DIA", "38% Agua", "Natural"] // Datos de [1]
            },
            {
                name: "Nicosia Blue",
                desc: "Azul cristalino y profundo. Transforma tu mirada con un toque celestial.",
                price: "$35.000 COP",
                img: IMGS.nicosia_blue,
                specs: ["14.2mm DIA", "38% Agua", "Efecto Doll"] // Datos de [2]
            },
            {name:"Honey", desc:"Tono miel natural. Efecto ampliador.", price:"$35.000 COP", img:IMGS.honey, specs:["14.2mm DIA","Anual"]}, // [3]
            {name:"Sugar Pop Brown", desc:"Café suave y natural.", price:"$35.000 COP", img:IMGS.sugar_pop_brown, specs:["14.2mm DIA","Natural"]} // [3]
        ]
    };

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        const category = 'lentes';
        const products = data[category];
        
        document.getElementById('sectionCount').textContent = products.length + ' productos';

        products.forEach((p) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const waLink = 'https://wa.me/573189653717?text=' + encodeURIComponent('Hola GlamBrat! Me interesa: ' + p.name + ' (' + p.price + ')');

            card.innerHTML = `
                <img src="${p.img}" class="card-img">
                <div class="card-body">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price}</div>
                    <a class="wa-btn" href="${waLink}" target="_blank">💬 Pedir</a>
                </div>
            `;
            
            card.addEventListener('click', () => openModal(p));
            grid.appendChild(card);
        });
    }

    function openModal(p) {
        document.getElementById('modalImg').src = p.img;
        document.getElementById('modalTitle').textContent = p.name;
        document.getElementById('modalDesc').textContent = p.desc;
        document.getElementById('modalPrice').textContent = p.price;
        
        const specsDiv = document.getElementById('modalSpecs');
        specsDiv.innerHTML = '';
        p.specs.forEach(s => {
            const span = document.createElement('span');
            span.style.cssText = "background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:8px; font-size:0.8rem;";
            span.textContent = s;
            specsDiv.appendChild(span);
        });

        const waLink = 'https://wa.me/573189653717?text=' + encodeURIComponent('Hola GlamBrat! Quiero pedir: ' + p.name);
        document.getElementById('modalWaBtn').href = waLink;

        document.getElementById('modalOverlay').classList.add('active');
    }

    document.getElementById('modalClose').addEventListener('click', () => {
        document.getElementById('modalOverlay').classList.remove('active');
    });

    // Iniciar carga
    window.onload = renderProducts;
</script>

</body>
</html>
